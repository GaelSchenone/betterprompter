<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BetterPrompter — Control</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: rgba(255,255,255,0.06);
    --text: #eee;
    --text-dim: #666;
    --accent: #00ff88;
    --accent-dim: rgba(0,255,136,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    padding-bottom: 40px;
    -webkit-tap-highlight-color: transparent;
  }

  .icon { width: 20px; height: 20px; display: block; }
  .icon-lg { width: 40px; height: 40px; display: block; }
  .icon-sm { width: 16px; height: 16px; display: block; }

  /* ── Header ─────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 4px 16px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 .icon { color: var(--accent); }
  .header .status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .header .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }
  .header .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* ── Card ───────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 16px;
    font-weight: 500;
  }

  /* ── Play button ────────────────────────── */
  .play-area {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
  }

  .play-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 0 40px rgba(0,255,136,0.15);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .play-btn:active { transform: scale(0.92); }
  .play-btn.paused {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    box-shadow: none;
  }
  .play-btn.paused:active { background: rgba(255,255,255,0.1); }
  .play-btn .icon-lg { width: 44px; height: 44px; }

  /* ── Speed ──────────────────────────────── */
  .speed-display {
    text-align: center;
    font-size: 48px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .speed-display .unit {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .speed-slider-wrap {
    position: relative;
    padding: 8px 0;
  }

  .speed-slider {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    outline: none;
    transition: background 0.2s;
    touch-action: none;
  }
  .speed-slider::-webkit-slider-runnable-track {
    height: 6px;
    border-radius: 3px;
  }
  .speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    margin-top: -11px;
    box-shadow: 0 0 20px rgba(0,255,136,0.2);
    border: 2px solid #000;
  }
  .speed-slider::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid #000;
  }
  .speed-slider::-moz-range-track {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
  }

  .speed-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    padding: 0 2px;
  }

  /* ── Speed presets ───────────────────────── */
  .speed-presets {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .speed-presets button {
    flex: 1;
    padding: 10px 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
  }
  .speed-presets button:active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* ── Jump buttons ────────────────────────── */
  .jump-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
  }
  .jump-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 14px 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    touch-action: manipulation;
  }
  .jump-btn .label {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 400;
  }
  .jump-btn .icon { color: var(--text-dim); }
  .jump-btn:active { background: rgba(255,255,255,0.06); }
  .jump-btn:active .icon { color: var(--text); }

  /* ── Control buttons ─────────────────────── */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 14px 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    touch-action: manipulation;
  }
  .action-btn:active { background: rgba(255,255,255,0.06); }
  .action-btn.danger:active { background: rgba(255,50,50,0.08); border-color: rgba(255,50,50,0.2); color: #ff5050; }

  /* ── Text input section ──────────────────── */
  .text-section textarea {
    width: 100%;
    min-height: 120px;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    padding: 12px;
    resize: vertical;
    font-family: system-ui, -apple-system, sans-serif;
    outline: none;
  }
  .text-section textarea:focus { border-color: var(--accent); }

  .text-section .send-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .text-section .send-row button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex: 1;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
  }
  .text-section .btn-send {
    background: var(--accent);
    color: #000;
  }
  .text-section .btn-send:active { opacity: 0.8; }
  .text-section .btn-clear {
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .text-section .btn-clear:active { background: rgba(255,255,255,0.08); }

  /* ── Connection help ─────────────────────── */
  .help-text {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 12px;
    line-height: 1.5;
  }
  .help-text .icon { color: var(--text-dim); width: 14px; height: 14px; }

  /* ── Responsive tweaks ───────────────────── */
  @media (max-width: 360px) {
    .play-btn { width: 80px; height: 80px; }
    .play-btn .icon-lg { width: 36px; height: 36px; }
    .speed-display { font-size: 38px; }
    .card { padding: 18px 14px; }
  }
  @media (min-width: 500px) {
    body { max-width: 420px; margin: 0 auto; }
  }
</style>
</head>
<body>

  <!-- ── Header ── -->
  <div class="header">
    <h1>
      <i data-lucide="monitor-smartphone" class="icon"></i>
      Control
    </h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Desconectado</span>
    </div>
  </div>

  <!-- ── Play / Pause ── -->
  <div class="card">
    <div class="card-title">Reproduccion</div>
    <div class="play-area">
      <button class="play-btn paused" id="playBtn">
        <i data-lucide="play" class="icon-lg"></i>
      </button>
    </div>
  </div>

  <!-- ── Speed ── -->
  <div class="card">
    <div class="card-title">Velocidad</div>
    <div class="speed-display">
      <span id="speedValue">120</span>
      <span class="unit">px/s</span>
    </div>
    <div class="speed-slider-wrap">
      <input type="range" class="speed-slider" id="speedSlider" min="0" max="500" value="120" step="1">
    </div>
    <div class="speed-labels">
      <span>0</span>
      <span>125</span>
      <span>250</span>
      <span>375</span>
      <span>500</span>
    </div>
    <div class="speed-presets">
      <button data-speed="60">Lenta</button>
      <button data-speed="120">Normal</button>
      <button data-speed="200">Rapida</button>
      <button data-speed="300">Turbo</button>
    </div>
  </div>

  <!-- ── Saltos ── -->
  <div class="card">
    <div class="card-title">Saltos</div>
    <div class="jump-grid">
      <button class="jump-btn" data-seconds="-10">
        <i data-lucide="skip-back" class="icon"></i>
        <span class="label">-10 s</span>
      </button>
      <button class="jump-btn" data-seconds="-5">
        <i data-lucide="chevron-left" class="icon"></i>
        <span class="label">-5 s</span>
      </button>
      <button class="jump-btn" data-seconds="5">
        <i data-lucide="chevron-right" class="icon"></i>
        <span class="label">+5 s</span>
      </button>
      <button class="jump-btn" data-seconds="10">
        <i data-lucide="skip-forward" class="icon"></i>
        <span class="label">+10 s</span>
      </button>
    </div>
  </div>

  <!-- ── Acciones ── -->
  <div class="card">
    <div class="card-title">Acciones</div>
    <div class="action-row">
      <button class="action-btn" id="resetBtn">
        <i data-lucide="rotate-ccw" class="icon-sm"></i>
        Volver al inicio
      </button>
      <button class="action-btn danger" id="reconnectBtn">
        <i data-lucide="refresh-cw" class="icon-sm"></i>
        Reconectar
      </button>
    </div>
  </div>

  <!-- ── Texto ── -->
  <div class="card text-section">
    <div class="card-title">Texto del speech</div>
    <textarea id="speechText" placeholder="Pega aca tu speech y presiona Enviar..."></textarea>
    <div class="send-row">
      <button class="btn-clear" id="clearTextBtn">
        <i data-lucide="trash-2" class="icon-sm"></i>
        Limpiar
      </button>
      <button class="btn-send" id="sendTextBtn">
        <i data-lucide="send" class="icon-sm"></i>
        Enviar texto
      </button>
    </div>
  </div>

  <!-- ── Help ── -->
  <div class="help-text">
    <i data-lucide="wifi" class="icon"></i>
    Asegurate de que el celular y la laptop esten en la misma red
  </div>

<script src="/vendor/lucide.min.js"></script>
<script>
(function(){
  // ── Elementos ──────────────────────────────────
  const playBtn = document.getElementById('playBtn');
  const speedSlider = document.getElementById('speedSlider');
  const speedValue = document.getElementById('speedValue');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const speechText = document.getElementById('speechText');
  const sendTextBtn = document.getElementById('sendTextBtn');
  const clearTextBtn = document.getElementById('clearTextBtn');
  const resetBtn = document.getElementById('resetBtn');
  const reconnectBtn = document.getElementById('reconnectBtn');

  // ── Estado ─────────────────────────────────────
  let playing = false;
  let ws = null;
  let reconnectTimer = null;

  // ── WebSocket ──────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/control.html?role=control`;
    ws = new WebSocket(url);

    ws.onopen = () => {
      statusDot.classList.add('connected');
      statusText.textContent = 'Conectado';
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Desconectado';
      scheduleReconnect();
    };

    ws.onerror = () => { ws.close(); };

    ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      if (msg.type === 'state') {
        if (msg.text) speechText.value = msg.text;
        speedSlider.value = msg.speed ?? 120;
        speedValue.textContent = Math.round(msg.speed ?? 120);
      }
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connect();
    }, 2000);
  }

  function send(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  // ── Play / Pause ───────────────────────────────
  function togglePlay() {
    playing = !playing;
    updatePlayButton();
    send({ type: playing ? 'play' : 'pause' });
  }

  function updatePlayButton() {
    playBtn.innerHTML = playing
      ? '<i data-lucide="pause" class="icon-lg"></i>'
      : '<i data-lucide="play" class="icon-lg"></i>';
    playBtn.classList.toggle('paused', !playing);
    lucide.createIcons();
  }

  playBtn.addEventListener('click', togglePlay);

  // ── Speed ──────────────────────────────────────
  let speedChangeTimer = null;

  speedSlider.addEventListener('input', () => {
    const val = parseInt(speedSlider.value);
    speedValue.textContent = val;
    clearTimeout(speedChangeTimer);
    speedChangeTimer = setTimeout(() => {
      send({ type: 'speed', value: val });
    }, 30);
  });

  document.querySelectorAll('.speed-presets button').forEach(btn => {
    btn.addEventListener('click', () => {
      const speed = parseInt(btn.dataset.speed);
      speedSlider.value = speed;
      speedValue.textContent = speed;
      send({ type: 'speed', value: speed });
    });
  });

  // ── Jump buttons ───────────────────────────────
  document.querySelectorAll('.jump-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const seconds = parseInt(btn.dataset.seconds);
      send({ type: 'jump', value: seconds });
      btn.style.transition = 'background 0s';
      btn.style.background = 'rgba(255,255,255,0.06)';
      setTimeout(() => { btn.style.background = ''; }, 100);
    });
  });

  // ── Reset ──────────────────────────────────────
  resetBtn.addEventListener('click', () => {
    send({ type: 'reset' });
  });

  // ── Reconnect ──────────────────────────────────
  reconnectBtn.addEventListener('click', () => {
    if (ws) { ws.close(); }
    connect();
  });

  // ── Text ───────────────────────────────────────
  sendTextBtn.addEventListener('click', () => {
    const text = speechText.value.trim();
    if (text) {
      send({ type: 'setText', text });

      // Feedback visual momentaneo
      const originalHtml = sendTextBtn.innerHTML;
      sendTextBtn.innerHTML = '<i data-lucide="check" class="icon-sm"></i> Enviado';
      lucide.createIcons();
      setTimeout(() => {
        sendTextBtn.innerHTML = originalHtml;
        lucide.createIcons();
      }, 1500);
    }
  });

  clearTextBtn.addEventListener('click', () => {
    speechText.value = '';
    send({ type: 'setText', text: '' });
  });

  // ── Keyboard ───────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      togglePlay();
    }
  });

  // ── Arranque ───────────────────────────────────
  lucide.createIcons();
  connect();

  window.addEventListener('pageshow', (e) => {
    if (e.persisted) connect();
  });

  console.log('BetterPrompter Control listo');
})();
</script>
</body>
</html>
