<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetterPrompter — Display</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000;
    --text: #fff;
    --accent: #00ff88;
    --accent-dim: rgba(0,255,136,0.15);
    --bar-bg: rgba(0,0,0,0.85);
    --radius: 10px;
    --font-size: 48px;
    --line-height: 1.5;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  .icon { width: 18px; height: 18px; display: block; }
  .icon-sm { width: 16px; height: 16px; display: block; }

  /* ── Toolbar ───────────────────────────────── */
  .toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--bar-bg);
    backdrop-filter: blur(12px);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .toolbar.visible { transform: translateY(0); }

  .toolbar .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .toolbar .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .toolbar .status-text { color: #999; font-size: 12px; }

  .toolbar .spacer { flex: 1; }

  .toolbar button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #ccc;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .toolbar button:active { transform: scale(0.96); }

  .toolbar .label-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #ccc;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
  }

  .toolbar input[type="range"] {
    width: 80px;
    accent-color: var(--accent);
  }

  .mirror-toggle.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .mirror-toggle.active .icon { color: var(--accent); }

  /* ── Text container ──────────────────────── */
  .scroll-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .scroll-text {
    position: absolute;
    left: 10%;
    right: 10%;
    top: 0;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: var(--font-size);
    line-height: var(--line-height);
    color: var(--text);
    text-shadow: 0 0 30px rgba(255,255,255,0.04);
    will-change: transform;
    padding: 20px 0;
    transform: scaleX(1);
  }
  .scroll-text.mirrored {
    transform: scaleX(-1);
  }

  .scroll-text .empty-state {
    color: #444;
    text-align: center;
    padding: 20vh 0;
    font-size: 20px;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .scroll-text .empty-state kbd {
    background: rgba(255,255,255,0.08);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 14px;
  }

  /* ── Speed overlay ───────────────────────── */
  .speed-overlay {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.15);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .speed-overlay.visible { opacity: 1; }

  /* ── Modal de texto ──────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal-box {
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 30px;
    width: 90%;
    max-width: 700px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .modal-box h2 {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #eee;
    margin-bottom: 16px;
  }
  .modal-box textarea {
    flex: 1;
    min-height: 300px;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: #eee;
    font-size: 16px;
    line-height: 1.6;
    padding: 16px;
    resize: vertical;
    font-family: system-ui, -apple-system, sans-serif;
    outline: none;
  }
  .modal-box textarea:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: flex-end;
  }
  .modal-actions button {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .modal-actions .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .modal-actions .btn-primary:hover { opacity: 0.85; }
  .modal-actions .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: #aaa;
  }
  .modal-actions .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* ── QR Panel ────────────────────────────── */
  .qr-panel {
    position: fixed;
    bottom: 80px;
    right: 20px;
    z-index: 50;
    background: var(--bar-bg);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    font-family: system-ui, -apple-system, sans-serif;
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
    transition: all 0.3s;
  }
  .qr-panel.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

  .qr-panel img { width: 140px; height: 140px; border-radius: 4px; display: block; margin: 0 auto 8px; }
  .qr-panel .qr-label { font-size: 11px; color: #888; }
  .qr-panel .qr-url { font-size: 11px; color: var(--accent); word-break: break-all; margin-top: 4px; }

  /* ── Hover hint ──────────────────────────── */
  .hover-hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.08);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 12px;
    pointer-events: none;
    transition: opacity 1s;
  }

  /* ── Responsive ──────────────────────────── */
  @media (max-width: 768px) {
    .scroll-text { left: 6%; right: 6%; --font-size: 28px; }
  }
</style>
</head>
<body>

  <!-- ── Toolbar ── -->
  <div class="toolbar" id="toolbar">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Desconectado</span>

    <div class="spacer"></div>

    <button id="textBtn" title="Editar texto (T)">
      <i data-lucide="file-text" class="icon-sm"></i>
      <span>Texto</span>
    </button>
    <button id="mirrorBtn" class="mirror-toggle active" title="Espejar texto (M)">
      <i data-lucide="flip-2" class="icon-sm"></i>
      <span>Espejo</span>
    </button>

    <div class="label-wrap">
      <span style="color:#999;font-size:11px;">A</span>
      <input type="range" id="fontSizeSlider" min="20" max="96" value="48">
      <span style="color:#999;font-size:15px;">A</span>
    </div>

    <button id="fullscreenBtn" title="Pantalla completa (F11)">
      <i data-lucide="maximize" class="icon"></i>
    </button>
    <button id="qrBtn" title="Mostrar QR">
      <i data-lucide="scan" class="icon"></i>
    </button>
  </div>

  <!-- ── Scroll container ── -->
  <div class="scroll-container" id="scrollContainer">
    <div class="scroll-text mirrored" id="scrollText">
      <div class="empty-state">
        No hay texto cargado<br><br>
        Presiona <kbd>T</kbd> o hace clic para pegar tu speech
      </div>
    </div>
  </div>

  <!-- ── Speed overlay ── -->
  <div class="speed-overlay" id="speedOverlay">-- 0 px/s --</div>

  <!-- ── Hover hint ── -->
  <div class="hover-hint" id="hoverHint">Mueve el mouse para mostrar controles</div>

  <!-- ── QR Panel ── -->
  <div class="qr-panel" id="qrPanel">
    <img id="qrImage" alt="QR Code">
    <div class="qr-label">Escanea para controlar</div>
    <div class="qr-url" id="qrUrl"></div>
  </div>

  <!-- ── Modal de texto ── -->
  <div class="modal-overlay" id="textModal">
    <div class="modal-box">
      <h2>Pega tu speech</h2>
      <textarea id="textInput" placeholder="Pega aca el texto de tu presentacion..."></textarea>
      <div class="modal-actions">
        <button class="btn-secondary" id="modalCancel">
          <i data-lucide="x" class="icon-sm"></i>
          Cancelar
        </button>
        <button class="btn-primary" id="modalApply">
          <i data-lucide="check" class="icon-sm"></i>
          Aplicar
        </button>
      </div>
    </div>
  </div>

<script src="/vendor/lucide.min.js"></script>
<script>
(function(){
  // ── Elementos ──────────────────────────────────
  const scrollText = document.getElementById('scrollText');
  const scrollContainer = document.getElementById('scrollContainer');
  const toolbar = document.getElementById('toolbar');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const speedOverlay = document.getElementById('speedOverlay');
  const mirrorBtn = document.getElementById('mirrorBtn');
  const fontSizeSlider = document.getElementById('fontSizeSlider');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const qrBtn = document.getElementById('qrBtn');
  const qrPanel = document.getElementById('qrPanel');
  const qrImage = document.getElementById('qrImage');
  const qrUrl = document.getElementById('qrUrl');
  const textBtn = document.getElementById('textBtn');
  const textModal = document.getElementById('textModal');
  const textInput = document.getElementById('textInput');
  const modalApply = document.getElementById('modalApply');
  const modalCancel = document.getElementById('modalCancel');
  const hoverHint = document.getElementById('hoverHint');

  // ── Estado ─────────────────────────────────────
  let playing = false;
  let speed = 120;
  let position = 0;
  let mirrored = true;
  let fontSize = 48;
  let lastTime = 0;
  let animId = null;
  let connected = false;
  let ws = null;
  let reconnectTimer = null;

  // ── WebSocket ──────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/display.html?role=display`;
    ws = new WebSocket(url);

    ws.onopen = () => {
      connected = true;
      statusDot.classList.add('connected');
      statusText.textContent = 'Conectado';
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    ws.onclose = () => {
      connected = false;
      statusDot.classList.remove('connected');
      statusText.textContent = 'Desconectado';
      scheduleReconnect();
    };

    ws.onerror = () => { ws.close(); };

    ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }

      switch (msg.type) {
        case 'state':
          if (msg.text) setText(msg.text);
          speed = msg.speed ?? speed;
          playing = msg.playing ?? false;
          position = msg.position ?? 0;
          updateOverlay();
          break;
        case 'speed':
          speed = msg.value;
          updateOverlay();
          break;
        case 'play':
          playing = true;
          updateOverlay();
          break;
        case 'pause':
          playing = false;
          updateOverlay();
          break;
        case 'setText':
          setText(msg.text);
          break;
        case 'jump':
          const jumpPx = msg.value * speed;
          position = Math.max(0, position + jumpPx);
          break;
        case 'reset':
          position = 0;
          break;
      }
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connect();
    }, 2000);
  }

  // ── Texto ──────────────────────────────────────
  function setText(text) {
    if (!text || !text.trim()) return;
    const empty = scrollText.querySelector('.empty-state');
    if (empty) empty.remove();
    let content = scrollText.querySelector('.text-content');
    if (!content) {
      content = document.createElement('div');
      content.className = 'text-content';
      scrollText.prepend(content);
      const es = scrollText.querySelector('.empty-state');
      if (es) es.remove();
    }
    content.textContent = text;
    position = 0;
  }

  function openTextModal() {
    const content = scrollText.querySelector('.text-content');
    textInput.value = content ? content.textContent : '';
    textModal.classList.add('open');
    textInput.focus();
  }

  function applyText() {
    const text = textInput.value.trim();
    if (text) {
      setText(text);
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'setText', text }));
      }
    }
    textModal.classList.remove('open');
  }

  // ── Loop de scroll ────────────────────────────
  function loop(time) {
    if (playing && lastTime) {
      const dt = (time - lastTime) / 1000;
      position += speed * dt;
      applyTransform();
    }
    lastTime = time;
    animId = requestAnimationFrame(loop);
  }

  function applyTransform() {
    const mirrorTransform = mirrored ? 'scaleX(-1)' : 'scaleX(1)';
    scrollText.style.transform = `translateY(${-position}px) ${mirrorTransform}`;
  }

  // ── Overlay ────────────────────────────────────
  let overlayTimeout = null;
  function updateOverlay() {
    if (playing) {
      speedOverlay.textContent = `-- ${Math.round(speed)} px/s --`;
      speedOverlay.classList.add('visible');
      clearTimeout(overlayTimeout);
    } else {
      speedOverlay.classList.remove('visible');
    }
  }

  // ── Toolbar auto-hide ──────────────────────────
  let toolbarTimeout = null;
  function showToolbar() {
    toolbar.classList.add('visible');
    hoverHint.style.opacity = '0';
    clearTimeout(toolbarTimeout);
    toolbarTimeout = setTimeout(() => {
      if (!textModal.classList.contains('open')) {
        toolbar.classList.remove('visible');
      }
    }, 3000);
  }

  // ── Inicializar QR ────────────────────────────
  async function initQR() {
    try {
      const res = await fetch('/api/info');
      const info = await res.json();
      const ctrlUrl = info.controlUrl;
      qrUrl.textContent = ctrlUrl;
      qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(ctrlUrl)}`;
      qrImage.alt = `QR: ${ctrlUrl}`;
    } catch {}
  }

  // ── Eventos ────────────────────────────────────
  let mouseActive = false;
  document.addEventListener('mousemove', () => {
    showToolbar();
    if (!mouseActive) {
      mouseActive = true;
      hoverHint.style.opacity = '0';
    }
  });

  scrollContainer.addEventListener('click', (e) => {
    if (e.target.closest('.toolbar') || e.target.closest('.modal-overlay') || e.target.closest('.qr-panel')) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'togglePlay' }));
    } else {
      playing = !playing;
      updateOverlay();
    }
  });

  mirrorBtn.addEventListener('click', () => {
    mirrored = !mirrored;
    mirrorBtn.classList.toggle('active');
    applyTransform();
  });

  fontSizeSlider.addEventListener('input', () => {
    fontSize = parseInt(fontSizeSlider.value);
    scrollText.style.setProperty('--font-size', fontSize + 'px');
    scrollText.style.fontSize = fontSize + 'px';
  });

  fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.() || document.documentElement.webkitRequestFullscreen?.();
    } else {
      document.exitFullscreen?.() || document.webkitExitFullscreen?.();
    }
  });

  qrBtn.addEventListener('click', () => {
    qrPanel.classList.toggle('visible');
  });

  textBtn.addEventListener('click', openTextModal);
  modalApply.addEventListener('click', applyText);
  modalCancel.addEventListener('click', () => textModal.classList.remove('open'));

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'togglePlay' }));
      } else {
        playing = !playing;
        updateOverlay();
      }
    }
    if (e.key === 't' || e.key === 'T') openTextModal();
    if (e.key === 'f' || e.key === 'F') fullscreenBtn.click();
    if (e.key === 'm' || e.key === 'M') mirrorBtn.click();
    if (e.key === 'Escape') {
      textModal.classList.remove('open');
      qrPanel.classList.remove('visible');
    }
  });

  // ── Arranque ───────────────────────────────────
  lucide.createIcons();
  initQR();
  connect();
  animId = requestAnimationFrame(loop);
  showToolbar();

  textModal.addEventListener('wheel', (e) => e.stopPropagation(), { passive: true });

  console.log('BetterPrompter Display listo');
  console.log('  Space -> Play/Pause');
  console.log('  T -> Editar texto');
  console.log('  M -> Espejar');
  console.log('  F -> Fullscreen');
})();
</script>
</body>
</html>
